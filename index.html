<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>I love you ❤️</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #1a0022, #000);
    overflow: hidden;
    font-family: monospace;
    color: white;
}

canvas {
    display: block;
}

/* ❤️ Zentrumstext */
#centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-40%, -50%);
    text-align: center;
}

#centerText h1 {
    font-size: 50px;
    margin: 0;
}

#centerText p {
    font-size: 18px;
    opacity: 0.7;
}

/* ⭐ N + Ö oben links */
#topLeft {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 30px;
    font-family: Great Vibes,cursive;
    color: white;
    text-shadow: 0 0 10px white;
    opacity: 0.9;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- 💖 TEXT MITTE -->
<div id="centerText">
    <h1>Ich liebe dich über alles♥️</h1>
    <p>Mein Herz wird für immer dir gehören♥️</p>
</div>

<!-- ⭐ N + Ö -->
<div id="topLeft">N + Ö</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 💖 HERZ
let particles = [];

for (let t = 0; t < Math.PI * 2; t += 0.01) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

    particles.push({
        x: canvas.width/2 + x * 35,
        y: canvas.height/2 + y * 35,
        offset: Math.random() * 1000
    });
}

// ⭐ STERNE
let stars = [];
for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*2
    });
}

function drawStars() {
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
}

// 💖 ANIMATION
function animate(time = 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawStars();

    ctx.font = "12px monospace";

    // ❤️ HERZ TEXT
    particles.forEach(p => {
        let x = p.x + Math.sin(time * 0.002 + p.offset) * 4;
        let y = p.y + Math.cos(time * 0.002 + p.offset) * 4;

        ctx.fillStyle = "#ff6b8a";
        ctx.shadowColor = "#ff6b8a";
        ctx.shadowBlur = 10;

        ctx.fillText("Ich Liebe Dich über Alles", x, y);
    });

    ctx.shadowBlur = 0;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
